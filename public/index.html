<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CUB Value</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-head">
          <div>
            <h1>CUB Portfolio</h1>
            <p id="source-note">Loading MarketData.app prices...</p>
          </div>
          <div class="hero-change positive" id="hero-day-change">--</div>
        </div>

        <div class="summary-grid">
          <article class="card">
            <span class="label">Total Market Value</span>
            <strong class="money" id="total-market-value">--</strong>
          </article>
          <article class="card split-card">
            <div>
              <span class="label">Total Cost Basis</span>
              <strong class="money" id="total-cost-basis">--</strong>
            </div>
            <div class="split-side">
              <span class="label">Gain %</span>
              <strong class="money small" id="total-gain-percent">--</strong>
            </div>
          </article>
          <article class="card accent-card">
            <span class="label">Total Gain/Loss</span>
            <strong class="money accent" id="total-gain-value">--</strong>
          </article>
        </div>
      </section>

      <section class="holdings-card">
        <div class="holdings-head">
          <div>
            <h2>Holdings</h2>
            <p id="holdings-count">0 positions</p>
          </div>
          <div class="holdings-actions">
            <div class="column-toggles" aria-label="Column visibility">
              <button class="column-toggle" id="toggle-cost" type="button" aria-pressed="false">
                Cost
              </button>
              <button class="column-toggle" id="toggle-price" type="button" aria-pressed="false">
                Price
              </button>
            </div>
            <button class="refresh-button" id="refresh-button" type="button">Refresh</button>
          </div>
        </div>

        <div class="table-wrap">
          <table id="holdings-table">
            <thead>
              <tr>
                <th>
                  <button class="sort-button active" type="button" data-sort-key="symbol" data-sort-direction="asc">
                    SYM <span class="sort-indicator">▲</span>
                  </button>
                </th>
                <th>SHARES</th>
                <th data-column="cost">COST</th>
                <th data-column="price">PRICE</th>
                <th>
                  <button class="sort-button" type="button" data-sort-key="dayChangeValue" data-sort-direction="none">
                    DAY CHG <span class="sort-indicator">↕</span>
                  </button>
                </th>
                <th>
                  <button class="sort-button" type="button" data-sort-key="perf1d" data-sort-direction="none">
                    1D <span class="sort-indicator">↕</span>
                  </button>
                </th>
                <th>
                  <button class="sort-button" type="button" data-sort-key="perf3d" data-sort-direction="none">
                    3D <span class="sort-indicator">↕</span>
                  </button>
                </th>
                <th>
                  <button class="sort-button" type="button" data-sort-key="perf5d" data-sort-direction="none">
                    5D <span class="sort-indicator">↕</span>
                  </button>
                </th>
                <th>
                  <button class="sort-button" type="button" data-sort-key="perf20d" data-sort-direction="none">
                    20D <span class="sort-indicator">↕</span>
                  </button>
                </th>
              </tr>
            </thead>
            <tbody id="holdings-body">
              <tr>
                <td colspan="9" class="empty-state">Loading holdings...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
  </html>
